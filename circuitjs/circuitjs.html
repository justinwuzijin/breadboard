    cursor: pointer;

/* ---- dark theme (layout unchanged; black/dark grey + white text) -------- */
html, body {
	background: #141414 !important;
	color: #f0f0f0 !important;
}
body > table,
body > div,
.gwt-DockLayoutPanel,
.gwt-SplitLayoutPanel,
.gwt-TabLayoutPanel,
.gwt-TabLayoutPanelContent,
.gwt-TabLayoutPanelTabs {

	color: #f0f0f0 !important;
}
.gwt-MenuBar,
.gwt-MenuBar-horizontal {
	background: #1e1e1e !important;
	background-image: none !important;
	border: none !important;
	border-bottom: 1px solid #333 !important;
	color: #f0f0f0 !important;
}
.gwt-MenuBar-horizontal .gwt-MenuItem {
	color: #f0f0f0 !important;
	font-weight: 500 !important;
	font-size: 10px !important;
	padding: 2px 5px !important;
}
.gwt-MenuBar .gwt-MenuItem-selected,

	color: #fff !important;
}
.gwt-MenuBar-horizontal .gwt-MenuItemSeparator,
.gwt-MenuBar-horizontal .gwt-MenuItemSeparator .menuSeparatorInner {
	background: #333 !important;
	border-left-color: #333 !important;
}
/* Dropdown menus — classic light style (readable dark text on white) */

.gwt-MenuBar-vertical table,
.gwt-MenuBar-vertical tbody,
.gwt-MenuBar-vertical tr,

.gwt-MenuBarPopup,
.gwt-MenuBarPopup .menuPopupMiddleCenter,
.gwt-MenuBarPopup table,

	background-color: #ffffff !important;
	color: #111 !important;
	border-color: #ccc !important;
}
.gwt-PopupPanel,
.gwt-DialogBox,
.dialogMiddleCenter,
.dialogContent {
	background: #ffffff !important;
	color: #111 !important;

.gwt-Label,
.gwt-HTML,

.gwt-Label-1off { color: #888 !important; }
.gwt-Label-2off { color: #aaa !important; }
.disabled,

/* Reset / RUN use default GWT .gwt-Button styling (clean.css) */
.gwt-TextBox,
.gwt-TextArea,

.gwt-ScrollPanel,

/* right control panel — white */
table,
table tbody,
table tr,
table td {
	background-color: #ffffff !important;
	color: #111 !important;
}
/* keep top menu bar dark (overrides table rules) */
.gwt-MenuBar,
.gwt-MenuBar-horizontal,
.gwt-MenuBar-horizontal table,
.gwt-MenuBar-horizontal td,
.gwt-MenuBar-horizontal tr,
.gwt-MenuBar-horizontal tbody {
	background: #1e1e1e !important;
	background-color: #1e1e1e !important;
	background-image: none !important;
	color: #f0f0f0 !important;
}
.gwt-MenuBar-horizontal .gwt-MenuItem {
	color: #f0f0f0 !important;
	font-size: 10px !important;
	padding: 2px 5px !important;
}
.triggerLabel {
	background: #1e1e1e !important;
	color: #f0f0f0 !important;
}
/* Keep the desktop File/Edit menubar even when the panel is narrow
   (CircuitJS otherwise swaps to a hamburger below 600px). */
@media only screen and (max-width: 600px) {
	.trigger,
	.toptrigger,
	.triggerLabel,
	.toptriggerlabel {
		display: none !important;
	}
	.gwt-MenuBar-horizontal > table {
		display: table !important;
		position: static !important;
		width: auto !important;
		height: auto !important;
		top: auto !important;
		left: auto !important;
		background: transparent !important;
		text-align: left !important;
	}
	.gwt-MenuBar-horizontal > table td {
		display: table-cell !important;
	}
	.gwt-MenuBar-horizontal .gwt-MenuItem {
		display: table-cell !important;
	}
}
/* Reset / RUN sit in the menubar strip (parent is the north dock slot) */
.menubar-sim-controls {
	position: absolute;
	right: 6px;
	top: 50%;
	transform: translateY(-50%);
	display: flex;
	align-items: center;
	gap: 5px;
	z-index: 2;
}
.menubar-sim-controls .topButton,
.menubar-sim-controls .gwt-Button {
	margin: 0 !important;
	padding: 1px 6px !important;
	font-size: 10px !important;
	line-height: 1.2 !important;
	height: auto !important;
	background: #e7e7e7 !important;
	background-image: none !important;
	color: #111 !important;
	border: 1px solid #bbb !important;
	border-radius: 3px !important;
	cursor: pointer;
}
.menubar-sim-controls .gwt-Button:hover {
	background: #f3f3f3 !important;
}
/* hide the right control sidebar entirely (sliders / circuit label) */
#painel,
.verticalPanel {
	display: none !important;
}

    <!-- This script tag is what actually loads the GWT module.  The -->
    <!-- 'nocache.js' file (also called a "selection script") is     -->
    <!-- produced by the GWT compiler in the module output directory -->
    <!-- or generated automatically in development mode.             -->
    <script language="javascript" src="circuitjs1/circuitjs1.nocache.js"></script>
    
    <!-- Include a history iframe to enable full GWT history support -->
    <!-- (the id must be exactly as shown)                           -->
    <iframe src="javascript:''" id="__gwt_historyFrame" style="width:0;height:0;border:0"></iframe>

    <script>
    (function relocateSimControls() {
      var tries = 0;
      function go() {
        var panel = document.getElementById('painel');
        var menuBar = document.querySelector('.gwt-MenuBar-horizontal');
        if (!panel || !menuBar) {
          if (++tries < 200) setTimeout(go, 50);
          return;
        }
        var buttons = panel.querySelectorAll('button');
        var toMove = [];
        for (var i = 0; i < buttons.length; i++) {
          var t = (buttons[i].textContent || '').replace(/\s+/g, ' ').trim();
          if (/^Reset$/i.test(t) || /RUN\s*\/\s*Stop|Run\s*\/\s*STOP/i.test(t)) {
            toMove.push(buttons[i]);
          }
        }
        if (toMove.length < 2) {
          if (++tries < 200) setTimeout(go, 50);
          return;
        }
        if (document.querySelector('.menubar-sim-controls')) return;
        var host = document.createElement('div');
        host.className = 'menubar-sim-controls';
        toMove.forEach(function (b) { host.appendChild(b); });
        menuBar.parentElement.appendChild(host);
        // Collapse the east dock slot so the canvas uses full width
        var east = panel.parentElement;
        if (east && east !== document.body) {
          east.style.width = '0';
          east.style.minWidth = '0';
          east.style.overflow = 'hidden';
          east.style.padding = '0';
          east.style.border = 'none';
        }
        panel.style.display = 'none';
        window.dispatchEvent(new Event('resize'));
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', go);
      } else {
        go();
      }
    })();
    </script>
